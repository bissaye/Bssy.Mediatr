name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Pack & push to NuGet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Pack
        run: dotnet pack Bssy.Mediatr.Core/Bssy.Mediatr.Core.csproj --configuration Release --no-build

      - name: Push to NuGet
        run: |
          dotnet nuget push Bssy.Mediatr.Core/bin/Release/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json
